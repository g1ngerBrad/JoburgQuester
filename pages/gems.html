<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Quester">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="../manifest.json">
<link rel="apple-touch-icon" href="../icon-180.png">
<title>Local Gems — Quester</title>
<style>
  html{background:#0f172a}
  #splash{position:fixed;inset:0;z-index:9999;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .35s ease}
  #splash.out{opacity:0;pointer-events:none}
  #splash-title{color:#22d3ee;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:13px;font-weight:600;letter-spacing:.15em;text-transform:uppercase}
  .sdot{width:8px;height:8px;border-radius:50%;background:#22d3ee;display:inline-block;animation:sdot 1.4s ease infinite}
  .sdot:nth-child(2){animation-delay:.16s}.sdot:nth-child(3){animation-delay:.32s}
  @keyframes sdot{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
</style>
<link rel="preconnect" href="https://cdn.tailwindcss.com">
<link rel="stylesheet" href="../styles/globals.css">
</head>
<body class="text-slate-100">

<div id="splash"><p id="splash-title">Local Gems</p><div style="display:flex;gap:8px"><span class="sdot"></span><span class="sdot"></span><span class="sdot"></span></div></div>

<div class="min-h-screen flex flex-col bg-slate-900">

  <!-- HEADER -->
  <header class="safe-top px-3 pb-3 flex items-center justify-between sticky bg-slate-900/90 backdrop-blur-md z-20 border-b border-slate-800/60" style="top:env(safe-area-inset-top)">
    <div class="flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12l4 6-10 13L2 9z"/><path d="M11 3 8 9l4 13 4-13-3-6"/><path d="M2 9h20"/></svg>
      <h1 class="font-semibold text-[15px] tracking-tight">Local Gems</h1>
    </div>
    <a href="settings.html" class="icon-btn" aria-label="Settings">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </a>
  </header>

  <!-- AI GENERATE STRIP -->
  <div class="px-4 pt-4 pb-2">
    <div id="gemQuestCard" class="hidden mb-3"></div>
    <div id="gemLoadingState" class="hidden bg-slate-800/50 border border-slate-700/60 rounded-2xl p-4 mb-3 fade-up">
      <div class="flex items-center gap-3">
        <svg class="spin text-cyan-400" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
        <p class="text-sm font-medium text-slate-200">Finding a local gem…</p>
      </div>
    </div>
    <div id="gemErrorBox" class="hidden bg-rose-950/40 border border-rose-800/60 text-rose-200 rounded-2xl p-3 text-sm mb-3 fade-up"></div>
    <button id="generateGemBtn" class="w-full flex items-center justify-center gap-2 rounded-2xl border border-cyan-500/40 bg-cyan-500/10 text-cyan-300 font-semibold py-3.5 text-[14px] transition active:scale-[0.98]">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
      Generate AI Local Gem
    </button>
  </div>

  <!-- TABS -->
  <div class="page-tab-bar mx-4 mt-2">
    <button id="tabMine" class="page-tab active">Mine</button>
    <button id="tabFound" class="page-tab">Found Nearby</button>
  </div>

  <!-- TAB CONTENT -->
  <div class="flex-1 px-4 pt-4 pb-40 overflow-y-auto no-scrollbar">
    <div id="myGemsSection">
      <div id="myGemsList" class="space-y-3">
        <p class="text-slate-500 text-sm text-center py-8">Loading…</p>
      </div>
    </div>
    <div id="foundGemsSection" class="hidden">
      <div id="foundGemsList" class="space-y-3">
        <p class="text-slate-500 text-sm text-center py-8">Loading…</p>
      </div>
    </div>
  </div>
</div>

<!-- ADD GEM BUTTON -->
<div class="fixed left-0 right-0 px-4 z-25" style="bottom:calc(100px + env(safe-area-inset-bottom, 0px))">
  <button id="addGemBtn" class="btn-primary w-full flex items-center justify-center gap-2 shadow-2xl" style="background:linear-gradient(135deg,#22d3ee 0%,#0891b2 100%);box-shadow:0 8px 24px -8px rgba(34,211,238,0.55)">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add Local Gem
  </button>
</div>

<!-- ================= ADD GEM MODAL ================= -->
<div id="addGemModal" class="hidden fixed inset-0 z-40 bg-black/60 bd-fade flex items-end sm:items-center justify-center">
  <div class="slide-up w-full bg-slate-800 rounded-t-3xl sm:rounded-3xl p-5 pb-8 max-h-[92vh] overflow-y-auto no-scrollbar">
    <div class="w-10 h-1 bg-slate-600 rounded-full mx-auto mb-4"></div>
    <h3 class="text-lg font-semibold mb-4">Add a Local Gem</h3>

    <label class="text-xs font-medium text-slate-300 mb-1.5 block">Title <span class="text-cyan-400">*</span></label>
    <input id="gemTitle" class="field mb-3" placeholder="e.g. The hidden waterfall at Kloof">

    <label class="text-xs font-medium text-slate-300 mb-1.5 block">Description</label>
    <textarea id="gemDesc" rows="3" class="field mb-3 resize-none" placeholder="Why is this place special?"></textarea>

    <label class="text-xs font-medium text-slate-300 mb-1.5 block">Photo (optional)</label>
    <div class="mb-4">
      <label class="flex items-center gap-2 cursor-pointer text-sm text-slate-300 bg-slate-700/60 border border-slate-600/50 rounded-xl px-4 py-3 mb-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Choose photo
        <input id="gemPhotoInput" type="file" accept="image/*" class="hidden">
      </label>
      <img id="gemPhotoPreview" class="hidden w-full h-36 object-cover rounded-xl" alt="">
      <p class="text-[11px] text-slate-500 mt-1">Compressed to 800px / 70% JPEG before upload.</p>
    </div>

    <p class="text-[11px] text-slate-500 mb-4">Your current location will be saved with this gem for nearby discovery.</p>

    <div class="flex gap-2">
      <button id="closeAddGemBtn" class="btn-ghost flex-1">Cancel</button>
      <button id="saveGemBtn" class="btn-primary flex-1" style="background:linear-gradient(135deg,#22d3ee 0%,#0891b2 100%);box-shadow:0 6px 20px -8px rgba(34,211,238,0.55)">Save Gem</button>
    </div>
  </div>
</div>

<!-- ================= BOTTOM NAV ================= -->
<nav class="bottom-nav">
  <div class="nav-items">
    <a href="gems.html" class="nav-tab active" aria-label="Local Gems">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12l4 6-10 13L2 9z"/><path d="M11 3 8 9l4 13 4-13-3-6"/><path d="M2 9h20"/></svg>
      <span>Gems</span>
    </a>
    <a href="home.html" class="nav-center" aria-label="Generate Quest">
      <div class="nav-generate-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
    </a>
    <a href="social.html" class="nav-tab" aria-label="Social">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Social</span>
    </a>
  </div>
</nav>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/env.js"></script>
<script src="../js/config.js"></script>
<script src="../js/state.js"></script>
<script src="../js/api.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/quests.js"></script>
<script src="../js/supabase.js"></script>
<script src="../js/gems.js"></script>
</body>
</html>
