<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Quester">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="../manifest.json">
<link rel="apple-touch-icon" href="../icon-180.png">
<link rel="apple-touch-startup-image" href="splash-640x1136.png"  media="(device-width: 320px) and (device-height: 568px)  and (-webkit-device-pixel-ratio: 2)">
<link rel="apple-touch-startup-image" href="splash-750x1334.png"  media="(device-width: 375px) and (device-height: 667px)  and (-webkit-device-pixel-ratio: 2)">
<link rel="apple-touch-startup-image" href="splash-1242x2208.png" media="(device-width: 414px) and (device-height: 736px)  and (-webkit-device-pixel-ratio: 3)">
<link rel="apple-touch-startup-image" href="splash-1125x2436.png" media="(device-width: 375px) and (device-height: 812px)  and (-webkit-device-pixel-ratio: 3)">
<link rel="apple-touch-startup-image" href="splash-828x1792.png"  media="(device-width: 414px) and (device-height: 896px)  and (-webkit-device-pixel-ratio: 2)">
<link rel="apple-touch-startup-image" href="splash-1242x2688.png" media="(device-width: 414px) and (device-height: 896px)  and (-webkit-device-pixel-ratio: 3)">
<link rel="apple-touch-startup-image" href="splash-1170x2532.png" media="(device-width: 390px) and (device-height: 844px)  and (-webkit-device-pixel-ratio: 3)">
<link rel="apple-touch-startup-image" href="splash-1284x2778.png" media="(device-width: 428px) and (device-height: 926px)  and (-webkit-device-pixel-ratio: 3)">
<link rel="apple-touch-startup-image" href="splash-1179x2556.png" media="(device-width: 393px) and (device-height: 852px)  and (-webkit-device-pixel-ratio: 3)">
<link rel="apple-touch-startup-image" href="splash-1290x2796.png" media="(device-width: 430px) and (device-height: 932px)  and (-webkit-device-pixel-ratio: 3)">
<link rel="apple-touch-startup-image" href="splash-1206x2622.png" media="(device-width: 402px) and (device-height: 874px)  and (-webkit-device-pixel-ratio: 3)">
<link rel="apple-touch-startup-image" href="splash-1320x2868.png" media="(device-width: 440px) and (device-height: 956px)  and (-webkit-device-pixel-ratio: 3)">
<title>Quest Log</title>
<link rel="preconnect" href="https://cdn.tailwindcss.com">
<link rel="stylesheet" href="../styles/globals.css">
<link rel="stylesheet" href="../styles/log.css">
</head>
<body class="text-slate-100">

<div id="splash"><p id="splash-title">Quester</p><div class="splash-dots"><span class="sdot"></span><span class="sdot"></span><span class="sdot"></span></div></div>

<div id="logPage" class="min-h-screen flex flex-col bg-slate-900">

  <!-- HEADER -->
  <header class="safe-top px-3 pb-3 flex items-center justify-between sticky bg-slate-900/90 backdrop-blur-md z-20 border-b border-slate-800/60">
    <a href="home.html" id="closeLogBtn" class="icon-btn" aria-label="Back">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </a>
    <h2 class="font-semibold text-[15px] tracking-tight">Quest Log</h2>
    <button id="weightsInfoBtn" class="icon-btn" aria-label="Category weightings">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </button>
  </header>

  <!-- LIST -->
  <div id="logList" class="flex-1 overflow-y-auto px-4 pt-4 pb-32 space-y-3 no-scrollbar"></div>

  <!-- BOTTOM ACTIONS -->
  <div class="log-bottom-actions safe-bottom fixed bottom-0 right-0 left-0 flex flex-col items-center gap-2 px-4 mb-4">
    <button id="addCustomBtn" class="btn-primary w-full flex items-center justify-center gap-2 shadow-2xl">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Custom Quest
    </button>
    <button id="resetWeightsBtn" class="flex items-center gap-1.5 text-[12px] text-slate-400 underline underline-offset-2 py-1">
      reset weightings
      <img src="../icons/reset.png" width="13" height="13" alt="" class="reset-icon">
    </button>
  </div>
</div>

<!-- ================= CUSTOM QUEST MODAL ================= -->
<div id="customModal" class="hidden fixed inset-0 z-40 bg-black/60 bd-fade flex items-end sm:items-center justify-center">
  <div class="slide-up w-full bg-slate-800 rounded-t-3xl sm:rounded-3xl p-5 safe-bottom max-h-[92vh] overflow-y-auto no-scrollbar">
    <div class="w-10 h-1 bg-slate-600 rounded-full mx-auto mb-4"></div>
    <h3 class="text-lg font-semibold mb-4">Add Custom Quest</h3>

    <label class="text-xs font-medium text-slate-300 mb-1.5 block">Title</label>
    <input id="customTitle" class="field mb-3" placeholder="e.g. Sunset at Northcliff Hill">

    <label class="text-xs font-medium text-slate-300 mb-1.5 block">Description</label>
    <textarea id="customDesc" rows="3" class="field mb-3 resize-none" placeholder="What's the quest?"></textarea>

    <label class="text-xs font-medium text-slate-300 mb-1.5 block">Category <span class="text-emerald-400">*</span></label>
    <select id="customCategory" class="field mb-3">
      <option value="">Select category…</option>
      <option value="In-Home/Chill">🛋️ In-Home / Chill</option>
      <option value="Urban Explorer">🏙️ Urban Explorer</option>
      <option value="Nature & Adventure">🌿 Nature & Adventure</option>
      <option value="Skills & Craft">🛠️ Skills & Craft</option>
      <option value="Physical Challenges">🏃 Physical Challenges</option>
      <option value="Exploration & Navigation">🗺️ Exploration & Navigation</option>
      <option value="Social Experiments">🗣️ Social Experiments</option>
      <option value="Creative & Media">🎨 Creative & Media</option>
      <option value="Comfort Zone">🧘 Comfort Zone</option>
    </select>

    <div class="grid grid-cols-2 gap-2 mb-4">
      <div>
        <label class="text-xs font-medium text-slate-300 mb-1.5 block">Difficulty</label>
        <select id="customDifficulty" class="field">
          <option>Simple</option>
          <option>Moderate</option>
          <option>Complex</option>
        </select>
      </div>
      <div>
        <label class="text-xs font-medium text-slate-300 mb-1.5 block">Cost</label>
        <select id="customCost" class="field">
          <option>Free</option>
          <option>Cheap</option>
        </select>
      </div>
    </div>

    <div class="flex gap-2">
      <button id="closeCustomBtn" class="btn-ghost flex-1">Cancel</button>
      <button id="saveCustomBtn" class="btn-primary flex-1">Save Quest</button>
    </div>
  </div>
</div>

<!-- ================= WEIGHTS MODAL ================= -->
<div id="weightsModal" class="hidden fixed inset-0 z-40 bg-black/60 bd-fade flex items-end sm:items-center justify-center">
  <div class="slide-up w-full bg-slate-800 rounded-t-3xl sm:rounded-3xl p-5 safe-bottom max-h-[80vh] overflow-y-auto no-scrollbar">
    <div class="w-10 h-1 bg-slate-600 rounded-full mx-auto mb-4"></div>
    <h3 class="text-lg font-semibold mb-1">Category Weightings</h3>
    <p class="text-xs text-slate-400 mb-5">Completing a quest adds to that category and removes from each other. Deleting a completed quest reverses this.</p>
    <div id="weightsContent"></div>
    <button id="closeWeightsBtn" class="btn-ghost w-full mt-2">Done</button>
  </div>
</div>

<script src="https://cdn.tailwindcss.com"></script>
<script src="../js/config.js"></script>
<script src="../js/state.js"></script>
<script src="../js/ui.js"></script>
<script src="../js/quests.js"></script>
<script src="../js/log.js"></script>
</body>
</html>
