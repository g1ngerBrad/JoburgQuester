<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Quester">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="../manifest.json">
<link rel="apple-touch-icon" href="../icon-180.png">
<title>Social — Quester</title>
<link rel="preconnect" href="https://cdn.tailwindcss.com">
<link rel="stylesheet" href="../styles/globals.css">
<link rel="stylesheet" href="../styles/social.css">
</head>
<body class="text-slate-100">

<div id="splash" class="splash-pink"><p id="splash-title">Social</p><div class="splash-dots"><span class="sdot"></span><span class="sdot"></span><span class="sdot"></span></div></div>

<div class="min-h-screen flex flex-col bg-slate-900">

  <!-- HEADER -->
  <header class="safe-top px-3 pb-3 flex items-center justify-between sticky bg-slate-900/90 backdrop-blur-md z-20 border-b border-slate-800/60">
    <div class="flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ec4899" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <h1 class="font-semibold text-[15px] tracking-tight">Social</h1>
    </div>
    <a href="settings.html" class="icon-btn" aria-label="Profile &amp; Settings">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </a>
  </header>

  <!-- FEED -->
  <div id="socialFeed" class="flex-1 px-4 pt-4 pb-32 space-y-4 overflow-y-auto no-scrollbar">
    <p class="text-slate-500 text-sm text-center py-8">Loading feed…</p>
  </div>
</div>

<!-- SHARE FAB -->
<button id="shareQuestFab" aria-label="Share a quest" class="share-fab">
  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
  Share Quest
</button>

<!-- ================= SHARE MODAL ================= -->
<div id="shareModal" class="hidden fixed inset-0 z-40 bg-black/60 bd-fade flex items-end sm:items-center justify-center">
  <div class="slide-up w-full bg-slate-800 rounded-t-3xl sm:rounded-3xl p-5 pb-8 max-h-[92vh] overflow-y-auto no-scrollbar">
    <div class="w-10 h-1 bg-slate-600 rounded-full mx-auto mb-4"></div>
    <h3 class="text-lg font-semibold mb-1">Share a Quest</h3>
    <p class="text-xs text-slate-400 mb-4">Pick a completed quest from your log to share publicly.</p>

    <div id="shareQuestPicker" class="mb-4 space-y-2 max-h-48 overflow-y-auto no-scrollbar">
      <p class="text-slate-500 text-sm text-center py-4">No completed quests yet.</p>
    </div>

    <div id="shareSelected" class="hidden mb-4 p-3 rounded-xl border border-pink-500/30 bg-pink-500/10">
      <p id="shareSelectedTitle" class="text-sm font-semibold text-pink-200"></p>
    </div>

    <label class="text-xs font-medium text-slate-300 mb-1.5 block">Photo (optional)</label>
    <div class="mb-3">
      <label class="flex items-center gap-2 cursor-pointer text-sm text-slate-300 bg-slate-700/60 border border-slate-600/50 rounded-xl px-4 py-3 mb-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Choose photo
        <input id="sharePhotoInput" type="file" accept="image/*" class="hidden">
      </label>
      <img id="sharePhotoPreview" class="hidden w-full h-36 object-cover rounded-xl mb-1" alt="">
      <p class="text-[11px] text-slate-500">Compressed to 800px / 70% JPEG before upload.</p>
    </div>

    <div class="flex gap-2 mt-2">
      <button id="closeShareBtn" class="btn-ghost flex-1">Cancel</button>
      <button id="submitShareBtn" class="btn-primary btn-pink flex-1">Share</button>
    </div>
  </div>
</div>

<!-- ================= COMMENTS MODAL ================= -->
<div id="commentsModal" class="hidden fixed inset-0 z-40 bg-black/60 bd-fade flex items-end sm:items-center justify-center">
  <div class="slide-up w-full bg-slate-800 rounded-t-3xl sm:rounded-3xl p-5 pb-8 max-h-[85vh] flex flex-col">
    <div class="w-10 h-1 bg-slate-600 rounded-full mx-auto mb-4 flex-shrink-0"></div>
    <h3 class="text-[15px] font-semibold mb-3 flex-shrink-0">Comments</h3>
    <div id="commentsList" class="flex-1 overflow-y-auto space-y-3 mb-4 no-scrollbar"></div>
    <div class="flex gap-2 flex-shrink-0">
      <input id="commentInput" class="comment-input flex-1" placeholder="Add a comment…">
      <button id="submitCommentBtn" class="comment-send-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <button id="closeCommentsBtn" class="btn-ghost w-full mt-3">Done</button>
  </div>
</div>

<!-- ================= BOTTOM NAV ================= -->
<nav class="bottom-nav">
  <div class="nav-items">
    <a href="gems.html" class="nav-tab" aria-label="Local Gems">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h12l4 6-10 13L2 9z"/><path d="M11 3 8 9l4 13 4-13-3-6"/><path d="M2 9h20"/></svg>
      <span>Gems</span>
    </a>
    <a href="home.html" class="nav-center" aria-label="Generate Quest">
      <div class="nav-generate-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </div>
    </a>
    <a href="social.html" class="nav-tab active" aria-label="Social">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Social</span>
    </a>
  </div>
</nav>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/env.js"></script>
<script src="../js/config.js"></script>
<script src="../js/state.js"></script>
<script src="../js/supabase.js"></script>
<script src="../js/social.js"></script>
</body>
</html>
