<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Quester">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="../manifest.json">
<link rel="apple-touch-icon" href="../icon-180.png">
<title>Settings — Quester</title>
<style>
  html{background:#0f172a}
  #splash{position:fixed;inset:0;z-index:9999;background:#0f172a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .35s ease}
  #splash.out{opacity:0;pointer-events:none}
  #splash-title{color:#10b981;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;font-size:13px;font-weight:600;letter-spacing:.15em;text-transform:uppercase}
  .sdot{width:8px;height:8px;border-radius:50%;background:#10b981;display:inline-block;animation:sdot 1.4s ease infinite}
  .sdot:nth-child(2){animation-delay:.16s}.sdot:nth-child(3){animation-delay:.32s}
  @keyframes sdot{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
  .section-card{background:#1e293b;border:1px solid rgba(51,65,85,0.6);border-radius:20px;padding:20px;margin-bottom:16px}
  .section-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#64748b;margin-bottom:14px}
  .avatar-ring{width:72px;height:72px;border-radius:50%;border:2px solid #10b981;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#10b981;background:#0f172a;cursor:pointer;overflow:hidden;position:relative}
  .avatar-ring img{width:100%;height:100%;object-fit:cover;border-radius:50%}
</style>
<link rel="preconnect" href="https://cdn.tailwindcss.com">
<link rel="stylesheet" href="../styles/globals.css">
</head>
<body class="text-slate-100">

<div id="splash"><p id="splash-title">Settings</p><div style="display:flex;gap:8px"><span class="sdot"></span><span class="sdot"></span><span class="sdot"></span></div></div>

<div class="min-h-screen flex flex-col bg-slate-900">

  <!-- HEADER -->
  <header class="safe-top px-3 pb-3 flex items-center gap-3 sticky bg-slate-900/90 backdrop-blur-md z-20 border-b border-slate-800/60" style="top:env(safe-area-inset-top)">
    <a href="javascript:history.back()" class="icon-btn" aria-label="Back">
      <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </a>
    <h1 class="font-semibold text-[15px] tracking-tight">Settings</h1>
  </header>

  <div class="flex-1 overflow-y-auto px-4 pt-4 pb-8 no-scrollbar">

    <!-- ── PROFILE SECTION ── -->
    <div class="section-card" id="profileSection">

      <!-- Logged out: auth tabs -->
      <div id="authPanel">
        <p class="section-title">Account</p>
        <div class="page-tab-bar mb-4" style="margin-left:-20px;margin-right:-20px;padding-left:20px;padding-right:20px;border-bottom:1px solid rgba(30,41,59,0.8)">
          <button id="tabSignIn" class="page-tab active">Sign In</button>
          <button id="tabSignUp" class="page-tab">Sign Up</button>
        </div>

        <!-- Sign In -->
        <div id="signInPanel">
          <label class="text-xs font-medium text-slate-300 mb-1.5 block">Email</label>
          <input id="signInEmail" type="email" class="field mb-3" placeholder="you@example.com" autocomplete="email">
          <label class="text-xs font-medium text-slate-300 mb-1.5 block">Password</label>
          <input id="signInPassword" type="password" class="field mb-4" placeholder="••••••••" autocomplete="current-password">
          <div id="signInError" class="hidden text-rose-400 text-xs mb-3"></div>
          <button id="signInBtn" class="btn-primary w-full">Sign In</button>
        </div>

        <!-- Sign Up -->
        <div id="signUpPanel" class="hidden">
          <label class="text-xs font-medium text-slate-300 mb-1.5 block">Name</label>
          <input id="signUpName" class="field mb-3" placeholder="Your name" autocomplete="name">
          <label class="text-xs font-medium text-slate-300 mb-1.5 block">Username</label>
          <input id="signUpUsername" class="field mb-3" placeholder="e.g. johndoe" autocomplete="username" style="text-transform:lowercase">
          <label class="text-xs font-medium text-slate-300 mb-1.5 block">Email</label>
          <input id="signUpEmail" type="email" class="field mb-3" placeholder="you@example.com" autocomplete="email">
          <label class="text-xs font-medium text-slate-300 mb-1.5 block">Password</label>
          <input id="signUpPassword" type="password" class="field mb-4" placeholder="Min 6 characters" autocomplete="new-password">
          <div id="signUpError" class="hidden text-rose-400 text-xs mb-3"></div>
          <div id="signUpSuccess" class="hidden text-emerald-400 text-xs mb-3"></div>
          <button id="signUpBtn" class="btn-primary w-full">Create Account</button>
        </div>
      </div>

      <!-- Logged in: profile view -->
      <div id="profilePanel" class="hidden">
        <p class="section-title">Profile</p>
        <div class="flex items-center gap-4 mb-5">
          <div class="avatar-ring" id="avatarBtn">
            <img id="avatarImg" class="hidden" alt="Avatar">
            <span id="avatarInitial"></span>
            <input id="avatarInput" type="file" accept="image/*" class="hidden">
          </div>
          <div>
            <p id="profileName" class="font-semibold text-slate-100"></p>
            <p id="profileUsername" class="text-sm text-slate-400"></p>
          </div>
        </div>

        <label class="text-xs font-medium text-slate-300 mb-1.5 block">Name</label>
        <input id="editName" class="field mb-3" placeholder="Your name">
        <label class="text-xs font-medium text-slate-300 mb-1.5 block">Username</label>
        <input id="editUsername" class="field mb-4" placeholder="username" style="text-transform:lowercase">
        <div id="profileUpdateMsg" class="hidden text-emerald-400 text-xs mb-3"></div>
        <button id="saveProfileBtn" class="btn-primary w-full mb-3">Save Profile</button>

        <details class="mt-1">
          <summary class="text-xs text-slate-400 cursor-pointer select-none">Change password</summary>
          <div class="mt-3">
            <label class="text-xs font-medium text-slate-300 mb-1.5 block">New Password</label>
            <input id="newPassword" type="password" class="field mb-3" placeholder="Min 6 characters" autocomplete="new-password">
            <div id="pwMsg" class="hidden text-xs mb-3"></div>
            <button id="changePasswordBtn" class="btn-ghost w-full text-sm">Update Password</button>
          </div>
        </details>

        <button id="signOutBtn" class="mt-4 w-full text-[13px] text-rose-400 underline underline-offset-2 py-1">Sign Out</button>
      </div>
    </div>

    <!-- ── FRIENDS SECTION (logged in only) ── -->
    <div class="section-card hidden" id="friendsSection">
      <p class="section-title">Friends</p>

      <div class="flex gap-2 mb-4">
        <input id="friendSearch" class="field flex-1" placeholder="Search by username…">
        <button id="friendSearchBtn" class="btn-ghost text-sm px-4">Find</button>
      </div>
      <div id="friendSearchResults" class="mb-4 space-y-2"></div>

      <p class="text-xs font-medium text-slate-400 mb-3">Your Friends</p>
      <div id="friendsList" class="space-y-2">
        <p class="text-slate-500 text-xs">No friends yet.</p>
      </div>
    </div>

    <!-- ── APP SETTINGS SECTION ── -->
    <div class="section-card">
      <p class="section-title">Quest Settings</p>

      <label class="text-xs font-medium text-slate-300 mb-1.5 block">Groq API Key</label>
      <input id="apiKeyInput" type="password" class="field mb-3" placeholder="gsk_…" autocomplete="off">
      <p class="text-[11px] text-slate-500 mb-4 leading-relaxed">
        Free key at <span class="text-emerald-400">console.groq.com/keys</span>. Model: <span class="text-slate-300">llama-3.3-70b-versatile</span>.
      </p>

      <label class="text-xs font-medium text-slate-300 mb-1.5 block">Your Location</label>
      <div class="relative mb-1.5">
        <input id="locationInput" type="text" class="field w-full pr-10" placeholder="e.g. Cape Town, South Africa" autocomplete="off" spellcheck="false">
        <button id="useCurrentLocationBtn" type="button" title="Use current location" class="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 hover:text-emerald-400 transition-colors p-1">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z" opacity=".3"/></svg>
        </button>
        <div id="locationSuggestions" class="hidden absolute left-0 right-0 top-full mt-1 bg-slate-700 border border-slate-600 rounded-xl overflow-hidden z-50 shadow-xl"></div>
      </div>
      <p class="text-[11px] text-slate-500 mb-4 leading-relaxed">Your origin for quest generation. Tap crosshair for current location.</p>

      <label class="text-xs font-medium text-slate-300 mb-1.5 block">Max Distance</label>
      <select id="maxDistanceInput" class="field mb-4">
        <option value="5">Within 5 km</option>
        <option value="10">Within 10 km</option>
        <option value="25">Within 25 km</option>
        <option value="50">Within 50 km</option>
        <option value="100">Within 100 km</option>
        <option value="250">Within 250 km</option>
      </select>

      <button id="saveSettingsBtn" class="btn-primary w-full">Save Settings</button>
      <div id="settingsSavedMsg" class="hidden text-center text-emerald-400 text-xs mt-2">Settings saved.</div>
    </div>

  </div>
</div>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/env.js"></script>
<script src="../js/config.js"></script>
<script src="../js/state.js"></script>
<script src="../js/supabase.js"></script>
<script src="../js/settings-page.js"></script>
</body>
</html>
